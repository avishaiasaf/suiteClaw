x-n8n-common: &n8n-common
  image: n8nio/n8n:latest
  environment: &n8n-env
    # Database
    DB_TYPE: postgresdb
    DB_POSTGRESDB_HOST: postgres
    DB_POSTGRESDB_PORT: 5432
    DB_POSTGRESDB_DATABASE: n8n
    DB_POSTGRESDB_USER: n8n
    DB_POSTGRESDB_PASSWORD_FILE: /run/secrets/pg_n8n_password
    # Queue mode
    EXECUTIONS_MODE: queue
    QUEUE_BULL_REDIS_HOST: redis
    QUEUE_BULL_REDIS_PORT: 6379
    QUEUE_BULL_REDIS_PASSWORD_FILE: /run/secrets/redis_password
    # Encryption key (MUST be identical across main + workers)
    N8N_ENCRYPTION_KEY_FILE: /run/secrets/n8n_encryption_key
    # Performance
    N8N_CONCURRENCY_PRODUCTION_LIMIT: 10
    EXECUTIONS_TIMEOUT: 3600
    EXECUTIONS_DATA_SAVE_ON_ERROR: all
    EXECUTIONS_DATA_SAVE_ON_SUCCESS: all
    # Pruning
    EXECUTIONS_DATA_PRUNE: "true"
    EXECUTIONS_DATA_MAX_AGE: 168
    # Metrics
    N8N_METRICS: "true"
    # Timezone
    GENERIC_TIMEZONE: ${TIMEZONE:-Asia/Jerusalem}
    TZ: ${TIMEZONE:-Asia/Jerusalem}
  volumes:
    - n8n-data:/home/node/.n8n
  secrets:
    - pg_n8n_password
    - redis_password
    - n8n_encryption_key
  networks:
    - internal
  restart: unless-stopped

services:
  # ─── Reverse Proxy ───────────────────────────────────────────
  traefik:
    image: traefik:v2.11
    container_name: sl-traefik
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      - traefik-certs:/acme
    networks:
      - web
      - internal
    restart: unless-stopped

  # ─── Database ────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: sl-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/pg_root_password
      # Passed to init script (01-create-databases.sh) for user creation.
      # Docker secrets are not readable by the postgres user during init,
      # so these env vars are the workaround. Only used on first boot.
      N8N_DB_PASSWORD: "${N8N_DB_PASSWORD}"
      MEMORY_DB_PASSWORD: "${MEMORY_DB_PASSWORD}"
      AUDIT_DB_PASSWORD: "${AUDIT_DB_PASSWORD}"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    secrets:
      - pg_root_password
      - pg_n8n_password
      - pg_memory_password
      - pg_audit_password
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Queue ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sl-redis
    command: >
      sh -c 'redis-server
      --requirepass "$$(cat /run/secrets/redis_password)"
      --appendonly yes
      --appendfsync everysec'
    volumes:
      - redis-data:/data
    secrets:
      - redis_password
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$(cat /run/secrets/redis_password)\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── n8n Main (UI / API / Webhooks) ─────────────────────────
  n8n-main:
    <<: *n8n-common
    container_name: sl-n8n-main
    environment:
      <<: *n8n-env
      N8N_HOST: ${N8N_HOST:-n8n.localhost}
      N8N_PORT: 5678
      N8N_PROTOCOL: https
      WEBHOOK_URL: https://${N8N_HOST:-n8n.localhost}/
      N8N_EDITOR_BASE_URL: https://${N8N_HOST:-n8n.localhost}/
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.n8n.rule=Host(`${N8N_HOST:-n8n.localhost}`)"
      - "traefik.http.routers.n8n.entrypoints=websecure"
      - "traefik.http.routers.n8n.tls.certresolver=letsencrypt"
      - "traefik.http.services.n8n.loadbalancer.server.port=5678"
    networks:
      - web
      - internal

  # ─── n8n Worker(s) ──────────────────────────────────────────
  n8n-worker:
    <<: *n8n-common
    command: worker
    depends_on:
      - n8n-main
      - redis
      - postgres
    deploy:
      replicas: ${N8N_WORKER_REPLICAS:-2}

  # ─── OPA Policy Engine ──────────────────────────────────────
  opa:
    image: openpolicyagent/opa:latest
    container_name: sl-opa
    command: >
      run --server
      --log-level info
      --addr :8181
      /policies/
      /data/
    volumes:
      - ./opa/policies:/policies:ro
      - ./opa/data:/data:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8181/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

# ─── Secrets (file-based, decrypted from SOPS at deploy time) ─
secrets:
  pg_root_password:
    file: ./secrets/decrypted/pg_root_password
  pg_n8n_password:
    file: ./secrets/decrypted/pg_n8n_password
  pg_memory_password:
    file: ./secrets/decrypted/pg_memory_password
  pg_audit_password:
    file: ./secrets/decrypted/pg_audit_password
  redis_password:
    file: ./secrets/decrypted/redis_password
  n8n_encryption_key:
    file: ./secrets/decrypted/n8n_encryption_key

# ─── Volumes ──────────────────────────────────────────────────
volumes:
  traefik-certs:
  postgres-data:
  redis-data:
  n8n-data:

# ─── Networks ─────────────────────────────────────────────────
networks:
  web:
    name: sl-web
  internal:
    name: sl-internal
    internal: true
