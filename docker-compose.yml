services:
  # ─── Reverse Proxy ───────────────────────────────────────────
  traefik:
    image: traefik:v2.11
    container_name: sl-traefik
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      - traefik-certs:/acme
    networks:
      - web
      - internal
    restart: unless-stopped

  # ─── OpenClaw AI Agent ──────────────────────────────────────
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: sl-openclaw
    environment:
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      OPENCLAW_GATEWAY_BIND: "0.0.0.0"
    volumes:
      - ./openclaw:/home/node/.openclaw
      - openclaw-data:/home/node/.openclaw/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.openclaw.rule=Host(`${OPENCLAW_HOST:-n8nsc.solutionlabtech.com}`)"
      - "traefik.http.routers.openclaw.entrypoints=websecure"
      - "traefik.http.routers.openclaw.tls.certresolver=letsencrypt"
      - "traefik.http.services.openclaw.loadbalancer.server.port=18789"
    networks:
      - web
      - internal
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ─── Database (audit logs + agent state) ────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: sl-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/pg_root_password
      AUDIT_DB_PASSWORD: "${AUDIT_DB_PASSWORD}"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    secrets:
      - pg_root_password
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── OPA Policy Engine ──────────────────────────────────────
  opa:
    image: openpolicyagent/opa:latest
    container_name: sl-opa
    command: >
      run --server
      --log-level info
      --addr :8181
      /policies/
      /data/
    volumes:
      - ./opa/policies:/policies:ro
      - ./opa/data:/data:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8181/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

# ─── Secrets ──────────────────────────────────────────────────
secrets:
  pg_root_password:
    file: ./secrets/decrypted/pg_root_password

# ─── Volumes ──────────────────────────────────────────────────
volumes:
  traefik-certs:
  postgres-data:
  openclaw-data:

# ─── Networks ─────────────────────────────────────────────────
networks:
  web:
    name: sl-web
  internal:
    name: sl-internal
    internal: true
