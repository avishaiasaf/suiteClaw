# Production overrides for Hetzner CPX32 (4 vCPU, 8GB RAM)
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  openclaw:
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
        reservations:
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  postgres:
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          memory: 512M

  opa:
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  traefik:
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
